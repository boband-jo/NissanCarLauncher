apply plugin: 'com.android.application'

android {
    namespace 'com.yourpackage.nissancarlauncher'  // 🔴 请改为你的实际包名
    compileSdk 34

    defaultConfig {
        applicationId "com.yourpackage.nissancarlauncher"  // 🔴 请改为你的实际包名
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // 本地 jar 依赖
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    
    // 如果你原本有 support 库依赖，需要迁移到 AndroidX，例如：
    // implementation 'androidx.appcompat:appcompat:1.6.1'
    // implementation 'com.google.android.material:material:1.9.0'
    
    // 如果有其他第三方依赖，请将原来的 compile 全部改为 implementation
}
